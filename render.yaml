version: 1

services:
  - type: web
    name: quran-app-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: uploads
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: quran-app-frontend
    env: static
    buildCommand: |
      echo "Building frontend static files..."
      mkdir -p dist
      cp -r assets/* dist/ 2>/dev/null || true
    staticPublishPath: ./dist
    envVars:
      - key: API_URL
        value: https://quran-app-api.onrender.com

autoDeploy: true
branch: main

healthCheckPath: /
healthCheckTimeout: 300

disk:
  name: uploads
  sizeGB: 1
  mountPath: /app/uploads

headers:
  - path: /*
    values:
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      X-XSS-Protection: 1; mode=block

ssl:
  enabled: true

buildCaching:
  paths:
    - ~/.cache/pip
  policy: pull-push

logging:
  enabled: true
  level: info

rateLimiting:
  enabled: true
  requestsPerMinute: 100
